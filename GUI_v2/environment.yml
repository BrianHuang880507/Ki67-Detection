name: gui_v2
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # Force OpenBLAS — MKL conflicts with PyTorch's bundled libiomp5md.dll and causes 0xc06d007f crash
  - libblas=*=*openblas
  - libcblas=*=*openblas
  - liblapack=*=*openblas

  # core scientific stack (conda-forge to avoid BLAS conflicts)
  - numpy=1.26.4
  - scipy=1.13.1
  - scikit-image=0.24.0
  - pillow=10.4.0
  - matplotlib=3.9.2
  - imageio=2.35.1
  - shapely=2.0.6
  - pandas=2.2.3
  - tqdm=4.67.1
  - natsort=8.4.0
  - pyqt=5.15.9

  - pip

  - pip:
      # pip options MUST come first
    - --extra-index-url https://download.pytorch.org/whl/cu126
    - torch
    - torchvision
    - opencv-python-headless==4.10.0.84
    - cellpose==3.1.1.1